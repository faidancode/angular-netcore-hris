<div class="page-container">
  <header class="page-header">
    <div class="page-header__content">
      <h2>Users</h2>
      <p>User Management.</p>
    </div>

    <div class="page-header__actions">
      <div class="search-field">
        <svg lucideSearch class="search-icon" [size]="18"></svg>
        <input type="text" placeholder="Search user..." aria-label="Search users"
          [ngModel]="query.searchQuery()"
          (ngModelChange)="onSearch($event)" />
      </div>

      <button *appHasPermission="'User:create'" class="btn btn-primary" (click)="openForm()"
        aria-label="Add user">
        <svg lucidePlus [size]="18"></svg>
        <span>Add User</span>
      </button>
    </div>
  </header>

  <div class="hris-table-wrapper">
    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th class="sortable" (click)="toggleSort('name')">
              Name <svg lucideArrowUpDown [size]="14"></svg>
            </th>
            <th class="sortable" (click)="toggleSort('roleName')">
              Email <svg lucideArrowUpDown [size]="14"></svg>
            </th>
            <th class="sortable" (click)="toggleSort('createdAt')">
              Created <svg lucideArrowUpDown [size]="14"></svg>
            </th>
            <th style="text-align: right">Actions</th>
          </tr>
        </thead>
        <tbody>
          @if (query.loading()) {
          @for (i of [1, 2, 3]; track i) {
          <tr class="animate-pulse">
            <td colspan="4">
              <div class="loading-skeleton"></div>
            </td>
          </tr>
          }
          } @else {
          @for (data of query.users(); track data.id) {
          <tr>
            <td style="font-weight: 700">{{ data.name }}</td>
            <td>{{ data.email }}</td>

            <td style="
                    color: #64748b;
                    font-size: 12px;
                    font-weight: 700;
                    text-transform: uppercase;
                  ">
              {{ data.createdAt | date: 'dd MMM yyyy' }}
            </td>
            <td>
              <div style="
                      display: flex;
                      align-items: center;
                      justify-content: flex-end;
                      gap: 0.25rem;
                    ">
                <button class="action-icon-btn" (click)="openForm(data)" aria-label="Edit user">
                  <svg lucidePencil [size]="16"></svg>
                </button>
                <button (click)="onDelete(data.id)" class="action-icon-btn delete" aria-label="Delete user">
                  <svg lucideTrash2 [size]="16"></svg>
                </button>
              </div>
            </td>
          </tr>
          }
          }
        </tbody>
      </table>
    </div>

    <div class="pagination-toolbar">
      <div class="flex items-center">
        <span class="page-info">Show</span>
        <select [ngModel]="query.limit()" (ngModelChange)="onLimitChange($event)" class="limit-select">
          <option [value]="10">10</option>
          <option [value]="25">25</option>
          <option [value]="50">50</option>
        </select>
      </div>

      <div class="flex items-center gap-6">
        <div class="flex items-center gap-2">
          <button class="page-btn-minimal" [disabled]="query.page() === 1" (click)="onPageChange(query.page() - 1)"
            aria-label="Previous page">
            <svg lucideChevronLeft [size]="16"></svg>
          </button>
          <span class="page-info">Page {{ query.page() }}</span>
          <button class="page-btn-minimal" [disabled]="query.loading() || !query.hasMore()"
            (click)="onPageChange(query.page() + 1)" aria-label="Next page">
            <svg lucideChevronRight [size]="16"></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
