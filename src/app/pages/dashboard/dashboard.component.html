<div class="dashboard-container animate-sharp">
  <header class="dashboard-header">
    <div class="header-content">
      <h2>Overview</h2>
      <p>Real-time operational monitoring and reporting</p>
    </div>

  </header>

  @if (loading()) {
    <section class="stats-grid" aria-busy="true" aria-live="polite">
      @for (placeholder of [1, 2, 3, 4, 5]; track placeholder) {
        <div class="stat-card stat-card--skeleton">
          <div class="card-header">
            <div class="icon-box">
              <div class="loading-skeleton icon-skeleton"></div>
            </div>
            <div class="loading-skeleton badge-skeleton"></div>
          </div>
          <div class="card-body">
            <div class="loading-skeleton skeleton-line skeleton-line--label"></div>
            <div class="loading-skeleton skeleton-line skeleton-line--value"></div>
          </div>
        </div>
      }
    </section>
  } @else {
    <section class="stats-grid">
      @for (card of stats(); track card.label) {
        <div class="stat-card">
          <div class="card-header">
            <div class="icon-box">
              <svg [lucideIcon]="card.icon" [size]="20" [class]="card.color"></svg>
            </div>
            <div
              class="change-badge"
              [class.positive]="card.positive"
              [class.negative]="!card.positive"
            >
              {{ card.change }}
            </div>
          </div>
          <div class="card-body">
            <p class="card-label">{{ card.label }}</p>
            <p class="card-value">{{ card.value }}</p>
          </div>
        </div>
      }
    </section>
  }
</div>
